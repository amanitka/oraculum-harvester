simfin:
  apiKey: $ORACULUM_SIMFIN_API_KEY
  chunkSize: $ORACULUM_SIMFIN_CHUNK_SIZE|500000
  refreshDays: $ORACULUM_SIMFIN_REFRESH_DAYS|1

alphaVantage:
  apiUrl: https://www.alphavantage.co
  apiKey: $ORACULUM_ALPHA_VANTAGE_API_KEY

kafka:
  brokers: $ORACULUM_KAFKA_BROKERS
  topics:
    market: oraculum.market
    industry: oraculum.industry
    news: oraculum.news
    dataFileReady: oraculum.data_file_ready

harvester:
  consumerGroup: oraculum-harvester
  requestTopic: oraculum.harvester.request
  dataPath: $ORACULUM_HARVESTER_DATA_PATH|./data
  exportPath: $ORACULUM_HARVESTER_EXPORT_PATH|./data/harvester
