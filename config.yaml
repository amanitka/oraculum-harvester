simfin:
  apiKey: $ORACULUM_HARVESTER_SIMFIN_API_KEY
  chunkSize: $ORACULUM_HARVESTER_SIMFIN_CHUNK_SIZE|500000
  refreshDays: $ORACULUM_HARVESTER_SIMFIN_REFRESH_DAYS|1

alphaVantage:
  apiUrl: https://www.alphavantage.co
  apiKey: $ORACULUM_HARVESTER_ALPHA_VANTAGE_API_KEY

kafka:
  brokers: $ORACULUM_HARVESTER_KAFKA_BROKERS
  topics:
    market: oraculum.market
    industry: oraculum.industry
    news: oraculum.news
    dataFileReady: oraculum.data_file_ready

harvester:
  consumerGroup: oraculum-harvester
  requestTopic: oraculum.harvester.request
  dataDirectory: $ORACULUM_HARVESTER_DATA_DIRECTORY|/app/harvester/data
  exchangeDirectory: $ORACULUM_HARVESTER_EXCHANGE_DIRECTORY|/app/exchange
