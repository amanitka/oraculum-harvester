simfin:
  apiKey: $ORACULUM_HARVESTER_SIMFIN_API_KEY
  chunkSize: $ORACULUM_HARVESTER_SIMFIN_CHUNK_SIZE|500000
  refreshDays: $ORACULUM_HARVESTER_SIMFIN_REFRESH_DAYS|1

kafka:
  brokers: $ORACULUM_HARVESTER_KAFKA_BROKERS
  topics:
    market: $ORACULUM_HARVESTER_KAFKA_TOPIC_MARKET|oraculum.market
    industry: $ORACULUM_HARVESTER_KAFKA_TOPIC_INDUSTRY|oraculum.industry
    dataFileReady: $ORACULUM_HARVESTER_KAFKA_TOPIC_DATA_FILE_READY|oraculum.data_file_ready


harvester:
  consumerGroup: $ORACULUM_HARVESTER_KAFKA_CONSUMER_GROUP|oraculum-harvester
  requestTopic: $ORACULUM_HARVESTER_KAFKA_TOPIC_HARVESTER_REQUEST|oraculum.harvester.request
  dataDirectory: $ORACULUM_HARVESTER_DATA_DIRECTORY|/app/data
  exchangeDirectory: $ORACULUM_HARVESTER_EXCHANGE_DIRECTORY|/app/exchange

openinsider:
  baseUrl: $ORACULUM_HARVESTER_OPENINSIDER_BASE_URL|"http://openinsider.com/screener"
  recordsPerPage: 1000
  delaySeconds: 2
  defaultParams:
    fd: 730
    isofficer: 1
    iscob: 1
    isceo: 1
    ispres: 1
    iscoo: 1
    iscfo: 1
    isgc: 1
    isvp: 1
    isdirector: 1
    istenpercent: 1
